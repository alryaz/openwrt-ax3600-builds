name: OpenWrt Build

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "0 */2 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

env:
  # Repository Configuration
  REMOTE_REPOSITORY: qosmio/openwrt-ipq
  REMOTE_BRANCH: main-nss
  NSS_PACKAGES_REPOSITORY: qosmio/nss-packages
  NSS_PACKAGES_REPOSITORY_BRANCH: NSS-12.5-K6.x
  AMNEZIAWG_REPOSITORY: Slava-Shchipunov/awg-openwrt
  AMNEZIAWG_BRANCH: master
  PASSWALL_PKG_REPOSITORY: Openwrt-Passwall/openwrt-passwall-packages
  PASSWALL_PKG_BRANCH: main
  PASSWALL2_REPOSITORY: Openwrt-Passwall/openwrt-passwall2
  PASSWALL2_BRANCH: main

  # Build Configuration
  CONFIG_FILE: ax3600.config
  CUSTOM_FILES_PATH: files

  # Release Configuration
  RELEASE_PREFIX: main-nss
  ARTIFACT_RETENTION_DAYS: 7
  RELEASES_TO_KEEP: 2

jobs:
  check_updates:
    name: Check for Updates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      build_required: ${{ steps.check.outputs.build_required }}
      main_sha: ${{ steps.check.outputs.main_sha }}
      nss_sha: ${{ steps.check.outputs.nss_sha }}
      awg_sha: ${{ steps.check.outputs.awg_sha }}
      passwall_pkg_sha: ${{ steps.check.outputs.passwall_pkg_sha }}
      passwall2_sha: ${{ steps.check.outputs.passwall2_sha }}
    steps:
      - name: Check upstream changes
        id: check
        run: |
          set -euo pipefail

          # Fetch upstream SHAs
          main_sha=$(gh api "repos/${REMOTE_REPOSITORY}/commits/${REMOTE_BRANCH}" --jq .sha)
          nss_sha=$(gh api "repos/${NSS_PACKAGES_REPOSITORY}/commits/${NSS_PACKAGES_REPOSITORY_BRANCH}" --jq .sha)
          awg_sha=$(gh api "repos/${AMNEZIAWG_REPOSITORY}/commits/${AMNEZIAWG_BRANCH}" --jq .sha)
          passwall2_sha=$(gh api "repos/${PASSWALL2_REPOSITORY}/commits/${PASSWALL2_BRANCH}" --jq .sha)
          passwall_pkg_sha=$(gh api "repos/${PASSWALL_PKG_REPOSITORY}/commits/${PASSWALL_PKG_BRANCH}" --jq .sha)

          # Get latest release body safely
          latest_release_body=$(gh release view --repo "${GITHUB_REPOSITORY}" --json body --jq .body 2>/dev/null || echo "")

          # Determine if build is required
          build_required=true
          if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]] && \
             [[ "$latest_release_body" == *"$passwall_pkg_sha"* ]] && \
             [[ "$latest_release_body" == *"$passwall2_sha"* ]] && \
             [[ "$latest_release_body" == *"$awg_sha"* ]] && \
             [[ "$latest_release_body" == *"$main_sha"* ]] && \
             [[ "$latest_release_body" == *"$nss_sha"* ]]; then
            build_required=false
          fi

          echo "Build required: $build_required"
          echo "Main SHA: $main_sha"
          echo "NSS SHA: $nss_sha"
          echo "AmneziaWG SHA: $awg_sha"
          echo "Passwall2 SHA: $passwall2_sha"
          echo "Passwall Packages SHA: $passwall_pkg_sha"

          # Output results
          echo "build_required=$build_required" >> "$GITHUB_OUTPUT"
          echo "main_sha=$main_sha" >> "$GITHUB_OUTPUT"
          echo "nss_sha=$nss_sha" >> "$GITHUB_OUTPUT"
          echo "awg_sha=$awg_sha" >> "$GITHUB_OUTPUT"
          echo "passwall2_sha=$passwall2_sha" >> "$GITHUB_OUTPUT"
          echo "passwall_pkg_sha=$passwall_pkg_sha" >> "$GITHUB_OUTPUT"

  build_firmware:
    name: Build Firmware
    needs: check_updates
    if: needs.check_updates.outputs.build_required == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      actions: read
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
    env:
      MAIN_SHA: ${{ needs.check_updates.outputs.main_sha }}
      NSS_SHA: ${{ needs.check_updates.outputs.nss_sha }}
      AWG_SHA: ${{ needs.check_updates.outputs.awg_sha }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          repository: ${{ env.REMOTE_REPOSITORY }}
          ref: ${{ env.MAIN_SHA }}
          fetch-depth: 0
          path: openwrt

      - name: Checkout builder assets
        uses: actions/checkout@v6
        with:
          path: builder_repo

      - name: Prepare build environment
        id: prepare_build_environment
        working-directory: openwrt
        run: |
          set -euo pipefail

          # Apply patches if they exist
          if compgen -G '../builder_repo/patches/*.patch' >/dev/null; then
            echo "Applying patches..."
            while IFS= read -r patch; do
              echo "Applying $patch"
              git apply --verbose "$patch"
            done < <(find ../builder_repo/patches -maxdepth 1 -type f -name '*.patch' | sort)
          fi

          # Add custom feed
          if [ ! -f feeds.conf ]; then
            cp feeds.conf.default feeds.conf
          fi
          echo "src-git qosmio https://github.com/qosmio/packages-extra" >> feeds.conf
          echo "src-git sqm_nss https://github.com/JuliusBairaktaris/sqm-scripts-nss" >> feeds.conf
          echo "src-git amneziawg https://github.com/${AMNEZIAWG_REPOSITORY}" >> feeds.conf
          echo "src-git-full passwall2 https://github.com/${PASSWALL2_REPOSITORY}" >> feeds.conf
          echo "src-git-full passwall_pkg https://github.com/${PASSWALL_PKG_REPOSITORY}" >> feeds.conf

          # Update and install feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a -p qosmio
          ./scripts/feeds install -a -p sqm_nss
          ./scripts/feeds install -a -p passwall_pkg
          ./scripts/feeds install -a -p passwall2
          ./scripts/feeds install -a

          # Configure
          cp "../builder_repo/${CONFIG_FILE}" .config
          make defconfig

          # Disable bundling custom repos
          sed -i 's/^CONFIG_FEED_luci_extra=.*/# CONFIG_FEED_luci_extra is not set/' .config
          sed -i 's/^CONFIG_FEED_qosmio=.*/# CONFIG_FEED_qosmio is not set/' .config
          sed -i 's/^CONFIG_FEED_sqm_nss=.*/# CONFIG_FEED_sqm_nss is not set/' .config
          sed -i 's/^CONFIG_FEED_amneziawg=.*/# CONFIG_FEED_amneziawg is not set/' .config
          sed -i 's/^CONFIG_FEED_passwall2=.*/# CONFIG_FEED_passwall2 is not set/' .config
          sed -i 's/^CONFIG_FEED_passwall_pkg=.*/# CONFIG_FEED_passwall_pkg is not set/' .config

          # Add custom files
          if [ -d "../builder_repo/${CUSTOM_FILES_PATH}" ]; then
            echo "Adding custom files..."
            mkdir -p "${CUSTOM_FILES_PATH}"
            rsync -a "../builder_repo/${CUSTOM_FILES_PATH}/" "${CUSTOM_FILES_PATH}/"

            # Ensure correct permissions for sshd_config
            if [ -f "${CUSTOM_FILES_PATH}/etc/ssh/sshd_config" ]; then
              chmod 0600 "${CUSTOM_FILES_PATH}/etc/ssh/sshd_config"
            fi
          fi

          # Set reproducible build parameters
          main_epoch=$(git show -s --format=%ct HEAD)
          echo "SOURCE_DATE_EPOCH=$main_epoch" >> "$GITHUB_ENV"
          echo "TZ=UTC" >> "$GITHUB_ENV"
          echo "LC_ALL=C" >> "$GITHUB_ENV"
          echo "KBUILD_BUILD_USER=builder" >> "$GITHUB_ENV"
          echo "KBUILD_BUILD_HOST=github" >> "$GITHUB_ENV"

      - name: Download sources
        working-directory: openwrt
        run: |
          set -euo pipefail
          echo "Starting download..."
          for attempt in 1 2 3; do
            make download -j"$(nproc)" V=s && break
            echo "Download attempt $attempt failed, retrying..."
            sleep 5
          done

      - name: Get OpenWRT toolchain hash
        id: get_toolchain_hash
        run: |
          echo "hash=$(git log --pretty=tformat:'%h' -n1 tools toolchain)" >> $GITHUB_OUTPUT

      - name: Restore OpenWRT toolchain cache
        id: restore_mt_tc
        uses: actions/cache/restore@v5
        with:
          path: |
            openwrt/staging_dir/host*
            openwrt/staging_dir/tool*
            openwrt/build_dir/host*
            openwrt/build_dir/tool*
          key: ${{ runner.os }}-ax3600-toolchain-${{ steps.get_toolchain_hash.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-ax3600-toolchain-

      - name: Build multithreaded (toolchain)
        if: steps.restore_mt_tc.outputs.cache-hit != 'true'
        id: build_mt_tc
        working-directory: openwrt
        run: |
          set -euo pipefail
          make -j"$(nproc)" tools/compile toolchain/compile

      - name: Save OpenWRT toolchain cache
        if: steps.build_mt_tc.outcome == 'success'
        uses: actions/cache/save@v5
        with:
          path: |
            openwrt/staging_dir/host*
            openwrt/staging_dir/tool*
            openwrt/build_dir/host*
            openwrt/build_dir/tool*
          key: ${{ runner.os }}-ax3600-toolchain-${{ steps.get_toolchain_hash.outputs.hash }}

      - name: Build multithreaded
        id: build_mt
        working-directory: openwrt
        continue-on-error: true
        run: |
          set -euo pipefail
          make -j"$(nproc)"

      - name: Build single threaded
        id: build_st
        if: steps.build_mt.outcome != 'success'
        working-directory: openwrt
        continue-on-error: true
        run: |
          set -euo pipefail
          make -j1

      - name: Build single threaded with verbosity
        id: build_st_verbose
        if: steps.build_mt.outcome != 'success' && steps.build_st.outcome != 'success'
        working-directory: openwrt
        continue-on-error: true
        run: |
          set -euo pipefail
          make -j1 V=s

      - name: Mark build as successful if any build succeeded
        run: |
          if [ "${{ steps.build_mt.outcome }}" != "success" ] && \
             [ "${{ steps.build_st.outcome }}" != "success" ] && \
             [ "${{ steps.build_st_verbose.outcome }}" != "success" ]; then
            echo "All builds failed."
            exit 1
          fi

      - name: Upload logs
        if: ${{ always() && steps.prepare_build_environment.conclusion != 'skipped' }}
        uses: actions/upload-artifact@v7
        with:
          name: logs
          path: openwrt/logs/
          if-no-files-found: warn
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

      - name: Save OpenWRT toolchain cache
        if: success()
        uses: actions/cache/save@v5
        with:
          path: |
            openwrt/staging_dir/host*
            openwrt/staging_dir/tool*
            openwrt/build_dir/host*
            openwrt/build_dir/tool*
          key: ${{ runner.os }}-ax3600-toolchain-${{ steps.get_toolchain_hash.outputs.hash }}
  
      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ipq807x-images
          path: openwrt/bin/targets/qualcommax/ipq807x
          if-no-files-found: error
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

      - name: Publish release
        if: success()
        id: release
        run: |
          set -euo pipefail

          date=$(date -u +%F)
          timestamp=$(date -u +%Y%m%dT%H%M%SZ)
          tag_name="${RELEASE_PREFIX}-${timestamp}-${GITHUB_RUN_ID}"
          echo "release_tag=$tag_name" >> "$GITHUB_OUTPUT"

          # Create release notes
          {
            echo "## OpenWrt Automated Build"
            echo "- **Date**: $date"
            echo "- **Main Commit**: \`${{ needs.check_updates.outputs.main_sha }}\`"
            echo "- **NSS Commit**: \`${{ needs.check_updates.outputs.nss_sha }}\`"
            echo "- **AmneziaWG Commit**: \`${{ needs.check_updates.outputs.awg_sha }}\`"
            echo "- **Passwall2 Commit**: \`${{ needs.check_updates.outputs.passwall2_sha }}\`"
            echo "- **Passwall Packages Commit**: \`${{ needs.check_updates.outputs.passwall_pkg_sha }}\`"
            echo "- **Trigger**: \`${{ github.event_name }}\`"
          } > release_notes.md

          mapfile -t assets < <(find openwrt/bin/targets/qualcommax/ipq807x/ -type f -not -path "*/packages/*")
          gh release create "$tag_name" \
            --repo "$GITHUB_REPOSITORY" \
            --title "OpenWrt Build $date" \
            --notes-file release_notes.md \
            "${assets[@]}"

          echo "Verifying release..."
          gh release view "$tag_name" || echo "WARNING: Release not found immediately after creation!"

      - name: Delete older releases
        if: success()
        env:
          KEEP: ${{ env.RELEASES_TO_KEEP }}
          CURRENT: ${{ steps.release.outputs.release_tag }}
        run: |
          gh release list --limit 100 --exclude-drafts --json tagName,publishedAt --order desc | \
          jq -r --argjson keep "${KEEP:-2}" --arg current "$CURRENT" \
            'sort_by(.publishedAt) | reverse | .[$keep:] | .[].tagName | select(. != $current)' | \
          while read -r tag; do gh release delete "$tag" --yes --cleanup-tag; done
